services:
  - type: web
    name: kivi-chatbot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://kivi-chatbot.netlify.app
