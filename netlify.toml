[build]
command = "npm install"
publish = "."

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/chatbot/:splat"
status = 200

[[headers]]
for = "/*"
[headers.values]
Access-Control-Allow-Origin = "*"
Access-Control-Allow-Methods = "GET, POST, OPTIONS"
Access-Control-Allow-Headers = "Content-Type"
